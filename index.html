<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northbrand Collective - Precision & Vision</title>
    <meta name="description" content="Northbrand Collective - Intersection of high-aperture photography, military precision, and technical engineering." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:wght@100;300;400;500&display=swap');
      
      :root {
        --leica-red: #E20613;
        --pure-black: #000000;
        --pure-white: #FFFFFF;
        --leica-gray: #1A1A1A;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--pure-white);
        color: var(--pure-black);
        overflow-x: hidden;
      }
      
      /* Leica Grain Overlay */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.05;
        z-index: 9999;
      }

      .font-mono {
        font-family: 'Roboto Mono', monospace;
      }

      .font-serif {
        font-family: 'Playfair Display', serif;
      }

      /* High contrast selection */
      ::selection {
        background: var(--leica-red);
        color: white;
      }

      @keyframes fade-in-up {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in-up {
        animation: fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--pure-white);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--leica-gray);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--leica-red);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",

    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
